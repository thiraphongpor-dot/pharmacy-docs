<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CPE 2567 · คณะเภสัชศาสตร์</title>
<style>:root{--ac:#22d3ee;--ac-rgb:6,182,212}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Noto Sans Thai',sans-serif;background:#06040f;color:#e2d9f3;min-height:100vh;position:relative;overflow-x:hidden}
/* Cosmic space BG */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 55% at 8% 50%,rgba(6,182,212,.16) 0%,transparent 70%),
    radial-gradient(ellipse 60% 55% at 92% 40%,rgba(139,92,246,.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 50% 60%,rgba(219,39,119,.1) 0%,transparent 65%),
    radial-gradient(ellipse 100% 100% at 50% 50%,#0a061a 0%,#06040f 100%);
  animation:nebulaBreath 18s ease-in-out infinite alternate}
@keyframes nebulaBreath{0%{opacity:1}50%{opacity:.88}100%{opacity:1}}
/* Star dust */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1.5px 1.5px at 15% 22%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 8%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 62% 18%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 5%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(2px 2px at 91% 35%,rgba(255,255,255,.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 5% 70%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 72% 75%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 48% 90%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(2px 2px at 25% 88%,rgba(200,180,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 92%,rgba(255,255,255,.2) 0%,transparent 100%)}
/* HEADER */
header{background:linear-gradient(180deg,rgba(10,6,26,.96),rgba(6,4,15,.9));border-bottom:1px solid rgba(255,255,255,.07);position:relative;overflow:hidden;z-index:2;backdrop-filter:blur(2px)}
header::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 60%,rgba(6,182,212,.1) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.1) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 100%,rgba(219,39,119,.06) 0%,transparent 50%);pointer-events:none}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--ac-rgb),.5),rgba(219,39,119,.4),transparent)}
/* Scan line */
.scan{position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(var(--ac-rgb),.7),rgba(255,255,255,.5),rgba(var(--ac-rgb),.7),transparent);
  animation:scanAnim 6s linear infinite;pointer-events:none;z-index:4;filter:blur(.5px)}
@keyframes scanAnim{0%{top:-2px;opacity:1}80%{opacity:.5}100%{top:105%;opacity:0}}
/* Corner decorations */
.hcorner{position:absolute;width:70px;height:70px;pointer-events:none;z-index:1}
.hcorner.tl{top:12px;left:14px;border-top:1px solid rgba(var(--ac-rgb),.3);border-left:1px solid rgba(var(--ac-rgb),.3)}
.hcorner.br{bottom:14px;right:14px;border-bottom:1px solid rgba(219,39,119,.25);border-right:1px solid rgba(219,39,119,.25)}
.hdot{position:absolute;border-radius:50%;animation:dotPulse 3s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.75;transform:scale(1.5)}}
.hi{max-width:1100px;margin:0 auto;padding:28px 28px 56px;position:relative;z-index:2}
.ht{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:22px}
.back{display:inline-flex;align-items:center;gap:7px;color:rgba(var(--ac-rgb),.85);text-decoration:none;
  font-size:.88rem;font-weight:700;background:rgba(255,255,255,.04);border:1px solid rgba(var(--ac-rgb),.2);
  padding:7px 18px;border-radius:20px;transition:.25s;font-family:'Space Mono',monospace;letter-spacing:.03em;
  backdrop-filter:blur(10px)}
.back:hover{background:rgba(var(--ac-rgb),.1);border-color:rgba(var(--ac-rgb),.45);box-shadow:0 0 20px rgba(var(--ac-rgb),.15)}
.lg{display:flex;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:3px;backdrop-filter:blur(10px)}
.lb{padding:6px 16px;border:none;background:transparent;color:rgba(255,255,255,.35);border-radius:16px;cursor:pointer;font-size:.85rem;font-weight:700;font-family:inherit;transition:.2s}
.lb.active{background:rgba(var(--ac-rgb),.2);color:rgb(var(--ac-rgb));border:1px solid rgba(var(--ac-rgb),.3)}
.hb{display:flex;align-items:center;gap:18px}
.hico{width:62px;height:62px;background:rgba(255,255,255,.05);border:1px solid rgba(var(--ac-rgb),.25);border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;
  box-shadow:0 0 30px rgba(var(--ac-rgb),.15),inset 0 1px 0 rgba(255,255,255,.08);
  animation:iconGlow 5s ease-in-out infinite;backdrop-filter:blur(10px)}
@keyframes iconGlow{0%,100%{box-shadow:0 0 20px rgba(var(--ac-rgb),.1)}50%{box-shadow:0 0 40px rgba(var(--ac-rgb),.3),0 0 70px rgba(var(--ac-rgb),.1)}}
.htxt h1{font-size:1.7rem;font-weight:800;color:#fff;line-height:1.2;
  background:linear-gradient(135deg,#fff 30%,rgba(var(--ac-rgb),1));-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:none;letter-spacing:-.01em}
.htxt p{font-size:.82rem;color:rgba(200,185,255,.4);margin-top:5px;font-family:'Space Mono',monospace;letter-spacing:.06em}
.srow{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.sc{background:rgba(255,255,255,.04);border:1px solid rgba(var(--ac-rgb),.15);border-radius:20px;padding:6px 18px;
  font-size:.84rem;color:rgba(var(--ac-rgb),.75);display:flex;align-items:center;gap:5px;
  font-family:'Space Mono',monospace;backdrop-filter:blur(8px);transition:.3s}
.sc strong{font-weight:700;color:rgb(var(--ac-rgb))}
/* STICKY SEARCH */
.sw{background:rgba(6,4,15,.85);backdrop-filter:blur(30px) saturate(1.8);
  border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:60}
.si{max-width:1100px;margin:0 auto;padding:11px 28px}
.sb{display:flex;align-items:center;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:10px 16px;gap:9px;transition:.3s;
  backdrop-filter:blur(20px)}
.sb:focus-within{border-color:rgba(var(--ac-rgb),.45);box-shadow:0 0 0 3px rgba(var(--ac-rgb),.06),0 0 30px rgba(var(--ac-rgb),.1)}
.sb input{flex:1;border:none;background:transparent;font-size:.95rem;color:#e2d9f3;outline:none;font-family:'Inter','Noto Sans Thai',sans-serif}
.sb input::placeholder{color:rgba(180,160,220,.35);font-family:'Space Mono',monospace;font-size:.85rem}
/* CONTENT */
.con{max-width:1100px;margin:0 auto;padding:24px 28px 60px;position:relative;z-index:1}
.nav-bar{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;
  background:rgba(255,255,255,.04);border:1px solid rgba(var(--ac-rgb),.2);border-radius:20px;
  font-size:.88rem;font-weight:700;color:rgba(var(--ac-rgb),.85);cursor:pointer;transition:.2s;
  font-family:'Space Mono',monospace;letter-spacing:.04em;white-space:nowrap;flex-shrink:0;
  backdrop-filter:blur(10px)}
.btn-back:hover{background:rgba(var(--ac-rgb),.12);border-color:rgba(var(--ac-rgb),.45);color:rgb(var(--ac-rgb));
  box-shadow:0 0 20px rgba(var(--ac-rgb),.15);transform:translateX(-3px)}
.nav-sep{color:rgba(255,255,255,.12);font-size:.75rem;flex-shrink:0}
.bc{display:flex;align-items:center;gap:4px;flex-wrap:wrap;font-size:.74rem;flex:1;min-width:0}
.bc-item{color:rgba(180,160,220,.45);cursor:pointer;padding:4px 10px;border-radius:10px;transition:.15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;font-family:'Space Mono',monospace;font-size:.8rem}
.bc-item:hover{background:rgba(var(--ac-rgb),.1);color:rgb(var(--ac-rgb))}
.bc-item.cur{color:rgba(var(--ac-rgb),.9);font-weight:700;cursor:default}
.bc-sep{color:rgba(var(--ac-rgb),.22);font-size:.7rem;flex-shrink:0}

/* ═══ FOLDER CARDS — GLASSMORPHISM + LARGE ICONS ═══ */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;margin-bottom:24px;padding:4px}
.fc{background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;cursor:pointer;position:relative;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  backdrop-filter:blur(20px) saturate(1.5);
  box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06)}
/* Inner glow on hover */
.fc::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at calc(var(--mx,.5)*100%) calc(var(--my,.5)*100%),rgba(255,255,255,.06) 0%,transparent 55%);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:1;border-radius:22px}
.fc:hover::before{opacity:1}
/* Neon top sweep */
.fc::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(var(--fc-rgb,200,180,255),1),transparent);
  transform:scaleX(0);transform-origin:center;transition:transform .45s ease;pointer-events:none;z-index:2}
.fc:hover::after{transform:scaleX(1)}
.fc:hover{background:rgba(255,255,255,.07);
  border-color:rgba(var(--fc-rgb,200,180,255),.4);
  box-shadow:0 8px 40px rgba(var(--fc-rgb,200,180,255),.15),0 0 0 1px rgba(var(--fc-rgb,200,180,255),.15),inset 0 1px 0 rgba(255,255,255,.1)}

.fc-top{padding:26px 20px 16px;display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;z-index:1;text-align:center}

/* LARGE FLOATING ICON */
.fc-ico{
  width:76px;height:76px;
  border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  position:relative;
  flex-shrink:0;
  animation:iconFloat var(--fd,4s) ease-in-out var(--fdelay,0s) infinite;
  box-shadow:0 4px 20px rgba(var(--fc-rgb,200,180,255),.25),0 0 40px rgba(var(--fc-rgb,200,180,255),.1),inset 0 1px 0 rgba(255,255,255,.15)}
@keyframes iconFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.04)}}
.fc-ico::after{content:'';position:absolute;inset:0;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 55%)}
/* Glow ring under icon */
.fc-ico::before{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  width:50px;height:8px;border-radius:50%;
  background:rgba(var(--fc-rgb,200,180,255),.3);
  filter:blur(6px);animation:glowRing var(--fd,4s) ease-in-out var(--fdelay,0s) infinite}
@keyframes glowRing{0%,100%{opacity:.5;width:40px}50%{opacity:.9;width:55px}}

.fc-name{font-weight:700;font-size:1rem;color:rgba(255,255,255,.9);line-height:1.4;letter-spacing:.01em;text-align:center}
.fc-bot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.fc-cnt{font-size:.78rem;color:rgba(180,160,220,.45);display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace}
.fc-arr{font-size:.7rem;color:rgba(var(--fc-rgb,200,180,255),.4);transition:transform .2s,color .2s;font-family:'Space Mono',monospace}
.fc:hover .fc-arr{transform:translateX(5px);color:rgba(var(--fc-rgb,200,180,255),.9)}
.fc-tag{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:8px;display:inline-flex;align-items:center;gap:3px;font-family:'Space Mono',monospace;letter-spacing:.04em}


/* ═══ LIST LAYOUT (depth >= 2) ═══ */
.flist{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.fl{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;
  display:flex;align-items:center;gap:16px;padding:14px 20px;cursor:pointer;
  position:relative;overflow:hidden;transition:all .22s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(20px);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.fl::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:rgba(var(--fc-rgb,200,180,255),.5);border-radius:2px 0 0 2px;
  transform:scaleY(0);transition:transform .2s ease}
.fl:hover{background:rgba(255,255,255,.07);border-color:rgba(var(--fc-rgb,200,180,255),.35);
  box-shadow:0 4px 24px rgba(var(--fc-rgb,200,180,255),.12),0 0 0 1px rgba(var(--fc-rgb,200,180,255),.1);
  transform:translateX(4px)}
.fl:hover::before{transform:scaleY(1)}
.fl-ico{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:26px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(var(--fc-rgb,200,180,255),.2),inset 0 1px 0 rgba(255,255,255,.12);
  animation:iconFloat var(--fd,4s) ease-in-out var(--fdelay,0s) infinite;position:relative}
.fl-ico::after{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 55%)}
.fl-body{flex:1;min-width:0}
.fl-name{font-weight:700;font-size:1.05rem;color:rgba(255,255,255,.9);line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fl-sub{font-size:.78rem;color:rgba(180,160,220,.4);margin-top:3px;
  display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace}
.fl-arr{font-size:.8rem;color:rgba(var(--fc-rgb,200,180,255),.35);flex-shrink:0;
  transition:transform .2s,color .2s;font-family:'Space Mono',monospace}
.fl:hover .fl-arr{transform:translateX(4px);color:rgba(var(--fc-rgb,200,180,255),.85)}
.fl-tag{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:7px;
  background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2);
  font-family:'Space Mono',monospace}

/* FILE LIST */
.file-section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;
  backdrop-filter:blur(20px);box-shadow:0 4px 28px rgba(0,0,0,.3);position:relative}
.file-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(var(--ac-rgb),.5),rgba(219,39,119,.4),transparent)}
.file-section-hdr{padding:14px 22px;background:rgba(255,255,255,.02);border-bottom:1px solid rgba(255,255,255,.05);
  font-size:.82rem;font-weight:700;color:rgba(var(--ac-rgb),.65);display:flex;align-items:center;gap:8px;
  font-family:'Space Mono',monospace;letter-spacing:.08em;text-transform:uppercase}
.fi{display:flex;align-items:center;padding:12px 20px;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s,padding-left .15s}
.fi:last-child{border-bottom:none}
.fi:hover{background:rgba(255,255,255,.03);padding-left:24px}
.fi-ico{font-size:1rem;flex-shrink:0;width:26px;text-align:center;opacity:.75}
.fi-name{flex:1;font-size:.92rem;color:rgba(226,217,243,.85);word-break:break-word;line-height:1.5}
.fi-meta{display:flex;align-items:center;gap:7px;flex-shrink:0}
.fbdg{font-size:.6rem;padding:2px 7px;border-radius:6px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.05em}
.bp{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.bd{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.bx{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.bi{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.bz{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.2)}
.bdl{display:inline-flex;align-items:center;gap:4px;padding:6px 15px;
  background:rgba(var(--ac-rgb),.1);color:rgb(var(--ac-rgb));border:1px solid rgba(var(--ac-rgb),.22);
  border-radius:10px;font-size:.8rem;font-weight:700;text-decoration:none;transition:.2s;white-space:nowrap;
  font-family:'Space Mono',monospace;letter-spacing:.02em}
.bdl:hover{background:rgba(var(--ac-rgb),.2);box-shadow:0 0 18px rgba(var(--ac-rgb),.2)}
/* SEARCH RESULTS */
.sr-wrap{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;
  backdrop-filter:blur(20px);position:relative}
.sr-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(var(--ac-rgb),.5),rgba(219,39,119,.4),transparent)}
.sr-hdr{padding:14px 22px;background:rgba(255,255,255,.02);font-size:.82rem;color:rgba(var(--ac-rgb),.65);font-weight:700;
  border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:8px;
  font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.sr-item{display:flex;align-items:center;padding:11px 20px;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s,padding-left .15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:rgba(255,255,255,.03);padding-left:24px}
.sr-path{font-size:.76rem;color:rgba(180,160,220,.4);margin-top:3px;font-family:'Space Mono',monospace}
mark.hl{background:rgba(var(--ac-rgb),.22);color:rgb(var(--ac-rgb));border-radius:2px;padding:0 2px}
.no-res{text-align:center;padding:64px 24px;color:rgba(180,160,220,.3)}
@keyframes rpl{to{transform:scale(1);opacity:0}}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.file-section,.sr-wrap{animation:fadeIn .22s ease}

/* ═══ PREVIEW MODAL ═══ */
#pv-modal{display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(3,2,12,.88);backdrop-filter:blur(16px);
  align-items:center;justify-content:center;padding:16px}
#pv-modal.open{display:flex}
.pv-box{background:rgba(14,10,32,.97);border:1px solid rgba(255,255,255,.1);
  border-radius:22px;width:100%;max-width:950px;height:88vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 0 1px rgba(var(--ac-rgb),.12);
  position:relative;animation:pvIn .25s cubic-bezier(.4,0,.2,1)}
@keyframes pvIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:none}}
.pv-hdr{display:flex;align-items:center;gap:12px;padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;
  background:rgba(255,255,255,.03)}
.pv-hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(var(--ac-rgb),.6),rgba(219,39,119,.4),transparent)}
.pv-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;background:rgba(var(--ac-rgb),.12);border:1px solid rgba(var(--ac-rgb),.2);flex-shrink:0}
.pv-title{flex:1;font-size:.9rem;font-weight:700;color:#e2d9f3;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pv-dl{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;
  background:rgba(var(--ac-rgb),.1);color:rgb(var(--ac-rgb));
  border:1px solid rgba(var(--ac-rgb),.25);border-radius:10px;
  font-size:.8rem;font-weight:700;text-decoration:none;transition:.2s;
  font-family:'Space Mono',monospace}
.pv-dl:hover{background:rgba(var(--ac-rgb),.22);box-shadow:0 0 18px rgba(var(--ac-rgb),.2)}
.pv-close{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);cursor:pointer;

<script>
let TREE_DATA=[];

let navStack=[],LC='th';
function setLang(l){
  LC=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  document.querySelectorAll('[data-th]').forEach(el=>{if(!el.children.length)el.textContent=el.getAttribute('data-'+l)||el.getAttribute('data-th');});
  document.getElementById('search-input').placeholder=l==='th'?'ค้นหาไฟล์หรือโฟลเดอร์…':'Search files or folders…';
  renderCurrent();
}
const FI_ICO={'.pdf':'📄','.docx':'📝','.doc':'📝','.xlsx':'📊','.xls':'📊','.pptx':'📈','.ppt':'📈','.jpg':'🖼️','.jpeg':'🖼️','.png':'🖼️','.zip':'📦','.rar':'📦','.txt':'📃'};
const FI_BDG={'.pdf':['PDF','p'],'.docx':['DOCX','d'],'.doc':['DOC','d'],'.xlsx':['XLSX','x'],'.xls':['XLS','x'],'.jpg':['IMG','i'],'.jpeg':['IMG','i'],'.png':['PNG','i'],'.zip':['ZIP','z']};
const CLS={p:'bp',d:'bd',x:'bx',i:'bi',z:'bz'};
function gExt(n){const m=n.match(/\.([^.]+)$/);return m?m[0].toLowerCase():'';}
function gIco(e){return FI_ICO[e]||'📁';}
function gBdg(e){const b=FI_BDG[e];if(!b)return '';return `<span class="fbdg ${CLS[b[1]]||''}">${b[0]}</span>`;}
function mkURL(p){return p.split('/').map(encodeURIComponent).join('/');}
function cntF(ns){let f=0;for(const n of ns){if(n.type==='file')f++;else f+=cntF(n.children||[]);}return f;}
const FSTYLE={"ปีงบประมาณ 2567":["🌙","219,39,119"],"ปีงบประมาณ 2568":["⭐","6,182,212"],"ปีงบประมาณ 2569":["✨","16,185,129"],"ต่ออายุ":["♾️","168,85,247"],"บทความวิชาการ":["🔭","6,182,212"],"2.บทความวิชาการ":["🔭","6,182,212"],"พิจารณาหน่วยกิต":["🔬","20,184,166"],"ภาระงาน ผู้ทรง":["👑","245,158,11"],"ภาระงาน - ผู้ทรงคุณวุฒิ":["👑","245,158,11"],"4.ภาระงาน - ผู้ทรงคุณวุฒิ":["👑","245,158,11"],"ประชุมวิชาการ":["🌐","99,102,241"],"1.ประชุมวิชาการ":["🌐","99,102,241"],"3.ต่ออายุ":["♾️","168,85,247"],"5.ระเบียบและเลขบัญชี":["💎","124,58,237"],"1.โครงการบริการวิชาการ":["🚀","219,39,119"],"2.ไม่ใช่โครงการบริการวิชาการ":["🌀","6,182,212"],"3.โครงการติวใบประกอบ":["🎓","16,185,129"]};
function getStyle(name){for(const [k,v] of Object.entries(FSTYLE)){if(name===k||name.startsWith(k))return v;}return ['🗃️','180,160,220'];}
function openFolder(node){navStack.push(node);document.getElementById('search-input').value='';renderCurrent();window.scrollTo({top:0,behavior:'smooth'});}
function goBack(){if(navStack.length>0){navStack.pop();renderCurrent();window.scrollTo({top:0,behavior:'smooth'});}}
function navTo(d){navStack=navStack.slice(0,d+1);renderCurrent();window.scrollTo({top:0,behavior:'smooth'});}
function renderNavBar(){
  const bar=document.getElementById('nav-bar'),depth=navStack.length;
  if(depth===0){bar.innerHTML='';return;}
  let h=`<button class="btn-back" onclick="goBack()">← ${LC==='th'?'ย้อนกลับ':'Back'}</button>`;
  h+=`<span class="nav-sep">|</span><div class="bc"><span class="bc-item" onclick="navTo(-1)">⌂</span>`;
  navStack.forEach((node,i)=>{h+=`<span class="bc-sep">›</span>`;if(i<depth-1)h+=`<span class="bc-item" onclick="navTo(${i})">${node.name}</span>`;else h+=`<span class="bc-item cur">${node.name}</span>`;});
  h+=`</div>`;bar.innerHTML=h;
}
function renderCurrent(){
  renderNavBar();
  const cur=navStack.length===0?TREE_DATA:navStack[navStack.length-1].children||[];
  const folders=cur.filter(n=>n.type==='folder'),files=cur.filter(n=>n.type==='file');
  const con=document.getElementById('main-con');con.innerHTML='';
  if(folders.length>0){
    const useList=navStack.length>=2;
    const grid=document.createElement('div');grid.className=useList?'flist':'fgrid';
    for(const f of folders){
      const [ico,rgb]=getStyle(f.name);
      const fc=cntF(f.children||[]),fd=(f.children||[]).filter(c=>c.type==='folder').length;
      const isClosed=f.name.includes('(ปิดโครงการ)')||f.name.includes('(ปิด คก.');
      const card=document.createElement('div');
      card.style.setProperty('--fc-rgb',rgb);
      if(useList){
        card.className='fl'+(isClosed?' fc-closed':'');
        card.innerHTML=`
          <div class="fl-ico" style="background:rgba(${rgb},.13);border:1px solid rgba(${rgb},.25)">${ico}</div>
          <div class="fl-body">
            <div class="fl-name">${f.name}</div>
            <div class="fl-sub">
              ${fd>0?`<span>📁 ${fd}</span>`:''}
              <span>📄 ${fc}</span>
              ${isClosed?`<span class="fl-tag">✓ ${LC==='th'?'ปิดแล้ว':'Closed'}</span>`:''}
            </div>
          </div>
          <span class="fl-arr">→</span>`;
      } else {
        card.className='fc'+(isClosed?' fc-closed':'');
        card.innerHTML=`
          <div class="fc-top">
            <div class="fc-ico" style="background:rgba(${rgb},.13);border:1px solid rgba(${rgb},.28)">${ico}</div>
            <div>
              <div class="fc-name">${f.name}</div>
              ${isClosed?`<span class="fc-tag" style="background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2);margin-top:5px">✓ ${LC==='th'?'ปิดแล้ว':'Closed'}</span>`:''}
            </div>
          </div>
          <div class="fc-bot">
            <span class="fc-cnt">${fd>0?`📁 ${fd}  `:''}📄 ${fc}</span>
            <span class="fc-arr">→</span>
          </div>`;
      }
      card.addEventListener('click',()=>openFolder(f));grid.appendChild(card);
    }
    con.appendChild(grid);
  }
  if(files.length>0){
    const sec=document.createElement('div');sec.className='file-section';
    sec.innerHTML=`<div class="file-section-hdr">✦ ${LC==='th'?'ไฟล์ในโฟลเดอร์':'FILES'} <span style="font-weight:400;opacity:.5">(${files.length})</span></div>`;
    for(const f of files){
      const ext=gExt(f.name);
      const dlUrl=f.driveId?'https://drive.google.com/uc?export=download&id='+f.driveId:mkURL(f.path);
      const pvUrl=f.driveId?'https://drive.google.com/file/d/'+f.driveId+'/preview':dlUrl;
      const row=document.createElement('div');
      row.className='fi';
      row.innerHTML=`<span class="fi-ico">${gIco(ext)}</span><span class="fi-name">${f.name}</span><span class="fi-meta">${gBdg(ext)}<button class="pbtn" onclick="openPV('${pvUrl}','${f.name.replace(/'/g,"\'")}','${ext}',${!!f.driveId})">👁 ${LC==='th'?'ดูก่อน':'Preview'}</button><a class="bdl" href="${dlUrl}" download="${f.name.replace(/"/g,'&quot;')}">⬇ ${LC==='th'?'ดาวน์โหลด':'DL'}</a></span>`;
      sec.appendChild(row);
    }
    con.appendChild(sec);
  }
  if(folders.length===0&&files.length===0){con.innerHTML=`<div class="no-res"><div style="font-size:2.5rem;margin-bottom:10px;opacity:.3">🌌</div><p style="font-family:Space Mono,monospace;font-size:.8rem;letter-spacing:.08em">${LC==='th'?'— ไม่มีไฟล์ —':'— EMPTY —'}</p></div>`;}
}
let stmr=null;
function onSearch(q){clearTimeout(stmr);stmr=setTimeout(()=>doSearch(q.trim().toLowerCase()),200);}
function flatMatch(nodes,q,pp){const res=[];for(const n of nodes){const path=[...pp,n.name];if(n.type==='file'&&n.name.toLowerCase().includes(q))res.push({n,path});else if(n.type==='folder')res.push(...flatMatch(n.children||[],q,path));}return res;}
function hl(t,q){if(!q)return t;const i=t.toLowerCase().indexOf(q);if(i<0)return t;return t.slice(0,i)+`<mark class="hl">${t.slice(i,i+q.length)}</mark>`+hl(t.slice(i+q.length),q);}
function doSearch(q){
  const con=document.getElementById('main-con');if(!q){renderCurrent();return;}con.innerHTML='';
  const matches=flatMatch(TREE_DATA,q,[]);
  if(!matches.length){con.innerHTML=`<div class="no-res"><div style="font-size:2rem;margin-bottom:10px;opacity:.25">🔍</div><p style="font-family:Space Mono,monospace;font-size:.8rem;letter-spacing:.08em">${LC==='th'?'— ไม่พบไฟล์ —':'— NO RESULTS —'}</p></div>`;return;}
  const sr=document.createElement('div');sr.className='sr-wrap';
  sr.innerHTML=`<div class="sr-hdr">✦ ${LC==='th'?`พบ ${matches.length} ไฟล์`:`${matches.length} FILES FOUND`}</div>`;
  for(const {n,path} of matches){
    const ext=gExt(n.name);
    const dlUrl=n.driveId?'https://drive.google.com/uc?export=download&id='+n.driveId:mkURL(n.path);
    const pvUrl=n.driveId?'https://drive.google.com/file/d/'+n.driveId+'/preview':dlUrl;
    const row=document.createElement('div');row.className='sr-item';
    row.innerHTML=`<span class="fi-ico">${gIco(ext)}</span><div style="flex:1;min-width:0"><div class="fi-name">${hl(n.name,q)}</div><div class="sr-path">${path.slice(0,-1).join(' › ')}</div></div><span class="fi-meta">${gBdg(ext)}<button class="pbtn" onclick="openPV('${pvUrl}','${n.name.replace(/'/g,"\'")}','${ext}',${!!n.driveId})">👁</button><a class="bdl" href="${dlUrl}" download="${n.name.replace(/"/g,'&quot;')}">⬇</a></span>`;
    sr.appendChild(row);
  }
  con.appendChild(sr);
}
window.addEventListener('DOMContentLoaded',()=>{
  const con=document.getElementById('main-con');
  con.innerHTML='<div style="text-align:center;padding:80px 0;color:rgba(255,255,255,.5);font-size:1.3rem">⏳ กำลังโหลดข้อมูล…</div>';
  fetch('https://script.google.com/macros/s/AKfycbxLT5vp4HUm-HkuYaBrS9FJsm-ldAjNwwE6sVCP53fg4c-i79HgFzA3fkmwj5SxtlJU/exec?type=cpe')
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
    .then(data=>{
      TREE_DATA=data.children||[];
      var fc=0,fd=0;
      (function cnt(n){n.forEach(x=>{if(x.type==='file')fc++;else{fd++;cnt(x.children||[]);}})})(TREE_DATA);
      var el=document.getElementById('file-count');if(el)el.textContent='✦ '+fc.toLocaleString()+' ไฟล์';
      var el2=document.getElementById('folder-count');if(el2)el2.textContent='◈ '+fd.toLocaleString()+' โฟลเดอร์';
      renderCurrent();
    })
    .catch(()=>{
      con.innerHTML='<div style="text-align:center;padding:80px 0;color:rgba(255,100,100,.8);font-size:1.2rem">❌ โหลดข้อมูลไม่สำเร็จ<br><small>กรุณารีเฟรชหน้า</small></div>';
    });
});

// ═══ PREVIEW ═══
const IMG_EXT=new Set(['.jpg','.jpeg','.png','.gif','.webp','.svg','.bmp']);
const ICO_MAP={'.pdf':'📄','.docx':'📝','.doc':'📝','.xlsx':'📊','.xls':'📊',
  '.pptx':'📈','.ppt':'📈','.jpg':'🖼️','.jpeg':'🖼️','.png':'🖼️',
  '.gif':'🖼️','.zip':'📦','.rar':'📦','.txt':'📃'};
function openPV(url,name,ext,isDrive){
  document.getElementById('pv-title').textContent=name;
  document.getElementById('pv-ico').textContent=ICO_MAP[ext]||'📁';
  const dl=document.getElementById('pv-dl');dl.href=url;dl.download=name;
  const body=document.getElementById('pv-body');body.innerHTML='';
  if(isDrive||ext==='.pdf'){
    const ifr=document.createElement('iframe');ifr.src=url;body.appendChild(ifr);
  } else if(!isDrive&&IMG_EXT.has(ext)){
    const img=document.createElement('img');img.src=url;img.alt=name;body.appendChild(img);
  } else if(ext==='.txt'||ext==='.md'){
    body.innerHTML='<div style="padding:24px;width:100%;height:100%;overflow:auto"><pre id="pv-txt" style="color:#e2d9f3;font-family:Space Mono,monospace;font-size:.85rem;line-height:1.7;white-space:pre-wrap;word-break:break-word">กำลังโหลด…</pre></div>';
    fetch(url).then(r=>r.text()).then(t=>{const p=document.getElementById('pv-txt');if(p)p.textContent=t;}).catch(()=>{const p=document.getElementById('pv-txt');if(p)p.textContent='ไม่สามารถโหลดได้';});
  } else {
    const extLabel=ext.replace('.','').toUpperCase();
    body.innerHTML=`<div class="pv-unsupported"><div class="pv-ext">${ICO_MAP[ext]||'📁'}</div><p>ไม่รองรับการแสดงตัวอย่างไฟล์ .${extLabel}<br><span style="font-size:.72rem;opacity:.6">กรุณาดาวน์โหลดเพื่อเปิดดู</span></p></div>`;
  }
  document.getElementById('pv-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closePV(){
  document.getElementById('pv-modal').classList.remove('open');
  document.body.style.overflow='';
  setTimeout(()=>{document.getElementById('pv-body').innerHTML='';},300);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePV();});

// ═══ PROGRESS BAR ═══
(function(){
  const b=document.createElement('div');
  b.style.cssText='position:fixed;top:0;left:0;height:2px;width:0;z-index:9999;transition:width .6s ease;'+
    'background:linear-gradient(90deg,transparent,rgb(var(--ac-rgb)),rgba(219,39,119,1),rgb(var(--ac-rgb)),transparent);'+
    'box-shadow:0 0 12px rgb(var(--ac-rgb)),0 0 25px rgba(219,39,119,.5)';
  document.body.prepend(b);
  setTimeout(()=>{b.style.width='100%';},10);
  setTimeout(()=>{b.style.opacity='0';setTimeout(()=>b.remove(),500);},900);
})();

// ═══ COSMIC PARTICLE NETWORK ═══
(function(){
  const cvs=document.createElement('canvas');
  cvs.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0';
  document.body.insertBefore(cvs,document.body.firstChild);
  const ctx=cvs.getContext('2d');
  const COLORS=['219,39,119','139,92,246','6,182,212','168,85,247'];
  let W,H,pts=[],mx=-999,my=-999;
  function resize(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;}
  resize();window.addEventListener('resize',()=>{resize();init();});
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  function init(){
    const N=Math.min(65,Math.floor(W*H/13000));
    pts=Array.from({length:N},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
      r:Math.random()*1.6+.5,
      c:COLORS[Math.floor(Math.random()*COLORS.length)]
    }));
  }
  init();
  function frame(){
    ctx.clearRect(0,0,W,H);
    for(const p of pts){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.c},.55)`;ctx.fill();
    }
    for(let i=0;i<pts.length;i++){
      const md=Math.hypot(pts[i].x-mx,pts[i].y-my);
      if(md<155){
        ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(mx,my);
        ctx.strokeStyle=`rgba(${pts[i].c},${(.3*(1-md/155)).toFixed(3)})`;ctx.lineWidth=.8;ctx.stroke();
      }
      for(let j=i+1;j<pts.length;j++){
        const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);
        if(d<120){
          ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
          const c=Math.random()>.5?pts[i].c:pts[j].c;
          ctx.strokeStyle=`rgba(${c},${(.18*(1-d/120)).toFixed(3)})`;ctx.lineWidth=.55;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(frame);
  }
  frame();
})();

// ═══ COUNTER ═══
function animCounter(el,target){
  const dur=1400,start=performance.now();
  function upd(now){const p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,4);el.textContent=Math.round(e*target).toLocaleString();if(p<1)requestAnimationFrame(upd);else el.textContent=target.toLocaleString();}
  requestAnimationFrame(upd);
}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('[data-count]').forEach(el=>animCounter(el,parseInt(el.dataset.count)));
});

// ═══ CARD EFFECTS ═══
function initCardEffects(grid){
  const cards=[...grid.children];
  cards.forEach((c,i)=>{
    c.style.opacity='0';
    setTimeout(()=>{c.style.animation=`cardIn .4s cubic-bezier(.4,0,.2,1) forwards`;},i*60+30);
  });
  cards.forEach(card=>{
    // Random float speed per card
    card.style.setProperty('--fd',(3.5+Math.random()*2.5)+'s');
    card.style.setProperty('--fdelay',(Math.random()*2)+'s');
    let tiltOn=false;
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      const x=(e.clientX-r.left)/r.width,y=(e.clientY-r.top)/r.height;
      card.style.setProperty('--mx',x);card.style.setProperty('--my',y);
      tiltOn=true;
      card.style.transform=`perspective(900px) rotateX(${(y-.5)*-10}deg) rotateY(${(x-.5)*10}deg) scale(1.02)`;
    });
    card.addEventListener('mouseleave',()=>{
      tiltOn=false;
      card.style.transition='transform .5s cubic-bezier(.4,0,.2,1), border-color .3s, box-shadow .3s, background .3s';
      card.style.transform='';
      setTimeout(()=>{if(!tiltOn)card.style.transition='';},550);
    });
    card.addEventListener('click',e=>{
      const r=card.getBoundingClientRect(),rpl=document.createElement('span');
      const sz=Math.max(r.width,r.height)*2.4;
      const rgb=getComputedStyle(card).getPropertyValue('--fc-rgb').trim()||'200,180,255';
      rpl.style.cssText=`position:absolute;pointer-events:none;border-radius:50%;width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px;background:rgba(${rgb},.12);transform:scale(0);animation:rpl .6s ease-out forwards;z-index:10`;
      card.appendChild(rpl);setTimeout(()=>rpl.remove(),650);
    });
  });
}
const __origRC=renderCurrent;
renderCurrent=function(){__origRC.apply(this,arguments);const g=document.querySelector('.fgrid,.flist');if(g)initCardEffects(g);};
</script>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — คณะเภสัชศาสตร์ BUU</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Poppins','Noto Sans Thai',sans-serif;
  background:#06040f;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:28px;
  color:#e2d9f3;
  position:relative;overflow:hidden;
}

/* ── Dark space BG ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 55% at 8% 50%,rgba(6,182,212,.18) 0%,transparent 70%),
    radial-gradient(ellipse 60% 55% at 92% 40%,rgba(139,92,246,.22) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 50% 60%,rgba(219,39,119,.11) 0%,transparent 65%),
    radial-gradient(ellipse 100% 100% at 50% 50%,#0a061a 0%,#06040f 100%);
  animation:nebulaBreath 18s ease-in-out infinite alternate}
@keyframes nebulaBreath{0%{opacity:1}50%{opacity:.88}100%{opacity:1}}

body::after{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1.5px 1.5px at 12% 18%,rgba(255,255,255,.32) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 9%,rgba(255,255,255,.22) 0%,transparent 100%),
    radial-gradient(2px 2px at 68% 15%,rgba(255,255,255,.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 6%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 94% 42%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 3% 68%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(2px 2px at 76% 75%,rgba(200,180,255,.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 52% 88%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 58%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 45%,rgba(200,180,255,.22) 0%,transparent 100%)}

#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#mouse-nebula{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 40% 35% at 50% 50%,rgba(139,92,246,.2) 0%,transparent 70%)}

.scan-line{position:fixed;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,.65),rgba(219,39,119,.55),rgba(6,182,212,.55),transparent);
  animation:scanAnim 8s linear infinite;pointer-events:none;filter:blur(.4px);z-index:2}
@keyframes scanAnim{0%{top:-2px;opacity:1}85%{opacity:.5}100%{top:101%;opacity:0}}

/* ── Wrap ── */
.wrap{position:relative;z-index:3;width:100%;max-width:900px}

/* ── Card glow frame ── */
.card-glow{
  position:relative;
  border-radius:27px;
  overflow:hidden;
  padding:1.5px;
  box-shadow:
    0 0 22px 4px rgba(139,92,246,.28),
    0 0 55px 10px rgba(139,92,246,.14),
    -14px 0 44px 5px rgba(6,182,212,.13),
    14px 0 44px 5px rgba(219,39,119,.1),
    0 0 110px 24px rgba(139,92,246,.1),
    0 44px 130px rgba(0,0,0,.72);
  animation:
    cardIn .6s cubic-bezier(.34,1.56,.64,1) both,
    glowPulse 5s ease-in-out infinite 1.5s;
}

/* Spinning gradient border */
.card-glow::before{
  content:'';
  position:absolute;
  width:160%;height:160%;
  top:-30%;left:-30%;
  background:conic-gradient(
    from 0deg,
    rgba(139,92,246,1),
    rgba(6,182,212,.9),
    rgba(219,39,119,.9),
    rgba(168,85,247,.95),
    rgba(139,92,246,1)
  );
  animation:rotateBorder 4s linear infinite;
  z-index:0;
}

@keyframes rotateBorder{to{transform:rotate(360deg)}}

@keyframes glowPulse{
  0%,100%{
    box-shadow:
      0 0 22px 4px rgba(139,92,246,.28),
      0 0 55px 10px rgba(139,92,246,.14),
      -14px 0 44px 5px rgba(6,182,212,.13),
      14px 0 44px 5px rgba(219,39,119,.1),
      0 0 110px 24px rgba(139,92,246,.1),
      0 44px 130px rgba(0,0,0,.72);
  }
  50%{
    box-shadow:
      0 0 34px 7px rgba(139,92,246,.42),
      0 0 75px 16px rgba(139,92,246,.2),
      -18px 0 58px 8px rgba(6,182,212,.18),
      18px 0 58px 8px rgba(219,39,119,.16),
      0 0 140px 32px rgba(139,92,246,.14),
      0 44px 130px rgba(0,0,0,.72);
  }
}

@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}

/* ── Card ── */
.card{
  display:flex;min-height:460px;
  border-radius:25px;overflow:hidden;
  position:relative;z-index:1;
}

/* ══════════════════════════
   LEFT — white form panel
══════════════════════════ */
.left{
  width:52%;
  background:white;
  padding:48px 50px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;z-index:2;
  box-shadow:8px 0 40px rgba(0,0,0,.35);
}

/* Logo */
.logo-wrap{display:flex;justify-content:center;margin-bottom:22px}
.logo-box{
  background:white;border:1.5px solid #ebebf8;border-radius:14px;
  padding:12px 20px 8px;max-width:260px;width:100%;
  box-shadow:0 4px 16px rgba(74,0,224,.1);
}
.logo-box img{width:100%;height:auto;display:block}
.logo-placeholder{font-size:.7rem;color:#bbb;font-family:'Space Mono',monospace;
  letter-spacing:.06em;padding:8px 0;text-align:center}

.title{text-align:center;font-size:1.6rem;font-weight:800;color:#1a1a3e;margin-bottom:4px}
.subtitle{text-align:center;font-size:.74rem;color:#ccc;
  font-family:'Space Mono',monospace;letter-spacing:.06em;margin-bottom:22px}
.divider{height:1px;background:linear-gradient(90deg,transparent,#ebebf8,transparent);margin-bottom:20px}

/* Error */
.login-error{
  background:rgba(239,68,68,.07);
  border:1.5px solid rgba(239,68,68,.22);
  border-radius:12px;
  padding:11px 15px;margin-bottom:16px;
  color:rgba(185,28,28,.85);
  font-size:.8rem;line-height:1.55;
  display:none;
  animation:errIn .2s ease;
}
@keyframes errIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

/* Google sign-in button area */
.google-btn-wrap{display:flex;justify-content:center;margin-bottom:18px}

.note{text-align:center;font-size:.7rem;color:#ccc;
  font-family:'Space Mono',monospace;letter-spacing:.04em;line-height:1.65}

/* Loading overlay */
.login-loading{
  display:none;position:absolute;inset:0;
  background:rgba(255,255,255,.8);
  border-radius:25px;
  align-items:center;justify-content:center;
  z-index:10;backdrop-filter:blur(8px);
}
.login-loading.show{display:flex}
.spin{
  width:34px;height:34px;
  border:2.5px solid rgba(139,92,246,.2);
  border-top-color:#7c3aed;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════
   RIGHT — dark space panel
══════════════════════════ */
.right{
  flex:1;position:relative;overflow:hidden;
  background:#050211;
  display:flex;align-items:center;justify-content:center;
}

.right::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 80% 25%,rgba(139,92,246,.16) 0%,transparent 70%),
    radial-gradient(ellipse 55% 45% at 20% 80%,rgba(6,182,212,.12) 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 65% 60%,rgba(219,39,119,.07) 0%,transparent 65%)}

.right::after{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1.5px 1.5px at 18% 12%,rgba(255,255,255,.42) 0%,transparent 100%),
    radial-gradient(1px 1px at 48% 7%,rgba(255,255,255,.28) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 20%,rgba(255,255,255,.36) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 38%,rgba(255,255,255,.24) 0%,transparent 100%),
    radial-gradient(1px 1px at 62% 55%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 32% 72%,rgba(200,180,255,.38) 0%,transparent 100%),
    radial-gradient(1px 1px at 83% 80%,rgba(255,255,255,.28) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 92%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 48%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 95% 65%,rgba(200,180,255,.25) 0%,transparent 100%),
    radial-gradient(2px 2px at 42% 33%,rgba(255,255,255,.16) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 46%,rgba(255,255,255,.2) 0%,transparent 100%)}

.cloud-svg{position:absolute;left:0;top:0;height:100%;width:84px;z-index:2;pointer-events:none}

.right-inner{position:relative;z-index:3;text-align:center;padding:40px;padding-left:84px}

.right-icon{
  width:64px;height:64px;border-radius:50%;
  background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.22);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 0 32px rgba(139,92,246,.18),inset 0 1px 0 rgba(255,255,255,.07);
  animation:iconPulse 4s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{box-shadow:0 0 32px rgba(139,92,246,.18)}50%{box-shadow:0 0 56px rgba(139,92,246,.32)}}

.right-title{font-size:1.5rem;font-weight:800;color:#f0eaff;margin-bottom:12px}
.right-desc{font-size:.82rem;color:rgba(180,160,220,.45);line-height:1.9;margin-bottom:20px}
.right-badge{
  display:inline-block;background:rgba(139,92,246,.08);
  border:1px solid rgba(139,92,246,.2);border-radius:20px;
  padding:5px 16px;font-size:.67rem;color:rgba(167,139,250,.65);
  font-family:'Space Mono',monospace;letter-spacing:.07em;
}
.right-shimmer{position:absolute;top:0;left:0;right:0;height:1.5px;z-index:3;
  background:linear-gradient(90deg,transparent 20%,rgba(139,92,246,.3),rgba(6,182,212,.22),transparent)}

/* Back link */
.back{display:block;text-align:center;margin-top:16px;
  font-size:.7rem;color:rgba(180,160,220,.2);text-decoration:none;
  font-family:'Space Mono',monospace;letter-spacing:.06em;transition:.2s}
.back:hover{color:rgba(180,160,220,.5)}

.cloud-h-svg{position:absolute;top:0;left:0;width:100%;height:70px;z-index:2;pointer-events:none;display:none}
@media(max-width:640px){
  body{padding:14px;align-items:flex-start;overflow-y:auto}
  .card{flex-direction:column;min-height:auto}
  .left{width:100%;min-width:0;padding:26px 22px;box-shadow:0 4px 28px rgba(0,0,0,.4)}
  .right{display:flex;flex:none}
  .cloud-svg{display:none}
  .cloud-h-svg{display:block}
  .right-inner{padding:62px 22px 22px}
  .right-icon{width:46px;height:46px}
  .right-title{font-size:1.15rem;margin-bottom:6px}
  .right-desc{font-size:.75rem;margin-bottom:10px}
  .logo-wrap{margin-bottom:14px}
  .title{margin-bottom:2px}
  .subtitle{margin-bottom:14px}
  .divider{margin-bottom:12px}
  .google-btn-wrap{margin-bottom:10px}
}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="auth.js"></script>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="mouse-nebula" aria-hidden="true"></div>
<div class="scan-line"></div>

<div class="wrap">
  <div class="card-glow">
  <div class="card">

    <!-- ══ LEFT: white form panel ══ -->
    <div class="left">
      <div class="login-loading" id="login-loading"><div class="spin"></div></div>

      <div class="logo-wrap">
        <div class="logo-box">
          <img src="logo.png" alt="BUU Faculty of Pharmaceutical Sciences"
            onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <p class="logo-placeholder" style="display:none">[ BUU · RxBUU Logo ]</p>
        </div>
      </div>

      <h1 class="title">เข้าสู่ระบบ</h1>
      <p class="subtitle">// BUU · FACULTY OF PHARMACY //</p>
      <div class="divider"></div>

      <div class="login-error" id="login-error"></div>
      <div class="google-btn-wrap" id="google-signin-btn"></div>

      <p class="note">
        กรุณาใช้อีเมลที่ได้รับสิทธิ์เท่านั้น<br>
        เพื่อเข้าถึงระบบจัดการเอกสาร
      </p>
    </div>

    <!-- ══ RIGHT: dark space panel ══ -->
    <div class="right">
      <div class="right-shimmer" aria-hidden="true"></div>

      <!-- Mobile: horizontal wavy cloud (hidden on desktop) -->
      <svg class="cloud-h-svg" viewBox="0 0 390 70" preserveAspectRatio="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0" y="0" width="390" height="18" fill="white"/>
        <circle cx="0"   cy="18" r="42" fill="white"/>
        <circle cx="78"  cy="18" r="46" fill="white"/>
        <circle cx="156" cy="18" r="48" fill="white"/>
        <circle cx="234" cy="18" r="46" fill="white"/>
        <circle cx="312" cy="18" r="48" fill="white"/>
        <circle cx="390" cy="18" r="42" fill="white"/>
      </svg>

      <svg class="cloud-svg" viewBox="0 0 84 460" preserveAspectRatio="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0" y="0" width="30" height="460" fill="white"/>
        <circle cx="30" cy="0"   r="46" fill="white"/>
        <circle cx="30" cy="92"  r="50" fill="white"/>
        <circle cx="30" cy="184" r="52" fill="white"/>
        <circle cx="30" cy="276" r="50" fill="white"/>
        <circle cx="30" cy="368" r="52" fill="white"/>
        <circle cx="30" cy="460" r="46" fill="white"/>
      </svg>

      <div class="right-inner">
        <div class="right-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="9" stroke="rgba(167,139,250,.8)" stroke-width="1.5"/>
            <path d="M10 14a4 4 0 1 0 8 0 4 4 0 0 0-8 0" stroke="rgba(167,139,250,.6)" stroke-width="1.2" fill="none"/>
            <circle cx="14" cy="14" r="2" fill="rgba(167,139,250,.5)"/>
            <path d="M14 5v2M14 21v2M5 14h2M21 14h2" stroke="rgba(167,139,250,.4)" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 class="right-title">ยินดีต้อนรับ</h2>
        <p class="right-desc">
          ระบบจัดการเอกสาร<br>
          คณะเภสัชศาสตร์<br>
          มหาวิทยาลัยบูรพา
        </p>
        <div class="right-badge">// BUU · RxBUU //</div>
      </div>
    </div>

  </div>
  </div><!-- /.card-glow -->
  <a class="back" href="index.html">← กลับหน้าหลัก</a>
</div>

<script>
/* Redirect if already logged in */
(function(){
  const u=getUser();
  if(u)location.replace(AUTH_CONFIG.HOME_PAGE);
})();

/* ── Auth callbacks ── */
function handleCredentialResponse(response){
  document.getElementById('login-loading').classList.add('show');
  const payload=decodeJWT(response.credential);
  if(!payload){
    showLoginError('เกิดข้อผิดพลาด ไม่สามารถอ่านข้อมูลบัญชีได้ กรุณาลองใหม่');
    document.getElementById('login-loading').classList.remove('show');
    return;
  }
  const email=(payload.email||'').toLowerCase();
  const allowed=AUTH_CONFIG.ALLOWED_EMAILS.map(e=>e.trim().toLowerCase());
  if(!allowed.includes(email)){
    showLoginError(
      '❌ อีเมลไม่ได้รับอนุญาต<br>'+
      'กรุณาติดต่อผู้ดูแลระบบเพื่อขอสิทธิ์การเข้าถึง<br>'+
      '<span style="opacity:.55;font-size:.85em">อีเมลที่ใช้: '+payload.email+'</span>'
    );
    document.getElementById('login-loading').classList.remove('show');
    return;
  }
  const user={
    email,
    name:payload.name||email.split('@')[0],
    picture:payload.picture||'',
    role:isAdmin({email})?'admin':'user',
    loginAt:Date.now()
  };
  setUser(user);
  // Sign into Firebase (for cross-device sync), then redirect
  signInToFirebase(response.credential)
    .catch(()=>{})
    .finally(()=>{ setTimeout(()=>location.replace(AUTH_CONFIG.HOME_PAGE),300); });
}

function showLoginError(msg){
  const el=document.getElementById('login-error');
  el.innerHTML=msg;el.style.display='block';
}

/* ── In-app browser detection ── */
function isInAppBrowser(){
  const ua=navigator.userAgent||'';
  return /Line\/|FBAN|FBAV|Instagram|Twitter|Snapchat|TikTok|MicroMessenger|WeChat|LinkedInApp|GSA\//.test(ua)
    || (/Android/.test(ua) && /Version\/\d/.test(ua) && !/Chrome\//.test(ua));
}

function showInAppWarning(){
  const wrap=document.getElementById('google-signin-btn');
  const pageUrl=window.location.href;
  const ua=navigator.userAgent||'';
  const isAndroid=/Android/.test(ua);
  const isIOS=/iPhone|iPad|iPod/.test(ua);
  const isLINE=/Line\//.test(ua);
  const chromeIntent=isAndroid
    ?`intent://${pageUrl.replace(/^https?:\/\//,'')}#Intent;scheme=https;package=com.android.chrome;end`
    :'';
  wrap.innerHTML=`
    <div style="
      background:rgba(251,191,36,.1);border:1.5px solid rgba(251,191,36,.45);
      border-radius:14px;padding:18px 16px;text-align:center;
    ">
      <div style="font-size:1.8rem;margin-bottom:8px">⚠️</div>
      <p style="color:#fbbf24;font-size:.85rem;font-weight:700;margin-bottom:6px">
        กรุณาเปิดในเบราว์เซอร์
      </p>
      <p style="color:#a0aec0;font-size:.78rem;line-height:1.5;margin-bottom:14px">
        ไม่สามารถ Login ผ่าน Google<br>ใน browser ของแอปได้
      </p>
      ${isAndroid?`
        <a href="${chromeIntent}" style="
          display:block;background:#4285f4;color:white;
          font-size:.88rem;font-weight:700;padding:11px 20px;border-radius:24px;
          text-decoration:none;margin-bottom:10px;
        ">🌐 เปิดใน Chrome</a>
      `:''}
      ${isIOS?`
        <div style="
          background:rgba(147,197,253,.08);border:1px solid rgba(147,197,253,.25);
          border-radius:10px;padding:10px 12px;margin-bottom:10px;
          color:#93c5fd;font-size:.8rem;line-height:1.7;text-align:left;
        ">
          ${isLINE
            ?'📱 กดปุ่ม <strong style="color:#fff">···</strong> มุมขวาบน<br>แล้วเลือก <strong style="color:#fff">"เปิดในเบราว์เซอร์"</strong>'
            :'📱 กดปุ่ม <strong style="color:#fff">แชร์ (Share)</strong><br>แล้วเลือก <strong style="color:#fff">"Open in Safari"</strong>'
          }
        </div>
      `:''}
      <button onclick="
        navigator.clipboard&&navigator.clipboard.writeText('${pageUrl}')
          .then(()=>{this.textContent='✓ คัดลอกแล้ว!';setTimeout(()=>{this.textContent='📋 คัดลอกลิงก์ → เปิดใน Chrome/Safari'},1500)})
      " style="
        display:block;width:100%;
        background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
        color:#e2d9f3;font-size:.82rem;font-weight:500;
        padding:10px 16px;border-radius:20px;cursor:pointer;
      ">📋 คัดลอกลิงก์ → เปิดใน Chrome/Safari</button>
    </div>`;
}

function initGIS(){
  // Block OAuth in WebView / in-app browsers (Google 403: disallowed_useragent)
  if(isInAppBrowser()){showInAppWarning();return;}
  google.accounts.id.initialize({
    client_id:AUTH_CONFIG.CLIENT_ID,
    callback:handleCredentialResponse
  });
  google.accounts.id.renderButton(
    document.getElementById('google-signin-btn'),
    {theme:'filled_black',size:'large',shape:'pill',width:260,locale:'th'}
  );
}

/* ── Mouse nebula ── */
(function(){
  const nebula=document.getElementById('mouse-nebula');
  let nx=50,ny=50,tx=50,ty=50;
  document.addEventListener('mousemove',e=>{
    tx=e.clientX/window.innerWidth*100;
    ty=e.clientY/window.innerHeight*100;
  });
  (function anim(){
    nx+=(tx-nx)*.055;ny+=(ty-ny)*.055;
    nebula.style.background=
      'radial-gradient(ellipse 42% 36% at '+nx.toFixed(2)+'% '+ny.toFixed(2)+'%,'+
      'rgba(139,92,246,.28) 0%,rgba(219,39,119,.1) 45%,transparent 70%)';
    requestAnimationFrame(anim);
  })();
})();

/* ── Canvas: stars · shooting stars · spaceship · particles ── */
(function(){
  const cvs=document.getElementById('bg-canvas');
  const ctx=cvs.getContext('2d');
  const COLORS=['139,92,246','6,182,212','219,39,119','168,85,247'];
  let W,H,stars=[],particles=[],shooters=[],mx=-999,my=-999;
  const ship={active:false,x:0,y:0,vx:0,vy:0,dir:1,size:13,trail:[],timer:0};

  function resize(){W=cvs.width=innerWidth;H=cvs.height=innerHeight}
  resize();
  window.addEventListener('resize',()=>{resize();init()});
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});

  function init(){
    stars=Array.from({length:Math.min(220,Math.floor(W*H/4500))},()=>({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.4+.2,
      a:Math.random()*.6+.1,va:(Math.random()-.5)*.007,
      sparkle:0
    }));
    particles=Array.from({length:Math.min(50,Math.floor(W*H/18000))},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
      r:Math.random()*1.5+.5,c:COLORS[Math.floor(Math.random()*COLORS.length)]
    }));
    ship.timer=Math.floor(Math.random()*300+200);
  }
  init();

  /* ── Spawn helpers ── */
  function spawnShip(){
    ship.dir=Math.random()>.5?1:-1;
    ship.x=ship.dir>0?-80:W+80;
    ship.y=Math.random()*H*.65+H*.06;
    const spd=Math.random()*2.5+2.5;
    ship.vx=ship.dir*spd; ship.vy=(Math.random()-.5)*.5;
    ship.size=Math.random()*5+11;
    ship.active=true; ship.trail=[];
  }

  /* ── Draw spaceship ── */
  function drawShip(x,y,s,dir){
    ctx.save();
    ctx.translate(x,y);
    if(dir<0)ctx.scale(-1,1);

    /* engine glow */
    const eg=ctx.createRadialGradient(-s*.9,0,0,-s*.9,0,s*.75);
    eg.addColorStop(0,'rgba(139,92,246,.95)');
    eg.addColorStop(.4,'rgba(219,39,119,.55)');
    eg.addColorStop(1,'rgba(139,92,246,0)');
    ctx.beginPath();ctx.ellipse(-s*.9,0,s*.9,s*.22,0,0,Math.PI*2);
    ctx.fillStyle=eg;ctx.fill();

    /* body */
    ctx.beginPath();
    ctx.moveTo(s*1.1,0);
    ctx.lineTo(s*.4,-s*.38);ctx.lineTo(-s*.55,-s*.38);
    ctx.lineTo(-s*.85,-s*.14);ctx.lineTo(-s*.85,s*.14);
    ctx.lineTo(-s*.55,s*.38);ctx.lineTo(s*.4,s*.38);
    ctx.closePath();
    ctx.fillStyle='rgba(215,210,248,.93)';
    ctx.strokeStyle='rgba(139,92,246,.3)';ctx.lineWidth=.6;
    ctx.fill();ctx.stroke();

    /* top wing */
    ctx.beginPath();
    ctx.moveTo(s*.05,-s*.38);ctx.lineTo(-s*.28,-s*1.08);ctx.lineTo(-s*.6,-s*.38);
    ctx.closePath();
    ctx.fillStyle='rgba(139,92,246,.8)';ctx.strokeStyle='rgba(168,85,247,.4)';ctx.lineWidth=.5;
    ctx.fill();ctx.stroke();

    /* bottom wing */
    ctx.beginPath();
    ctx.moveTo(s*.05,s*.38);ctx.lineTo(-s*.28,s*1.08);ctx.lineTo(-s*.6,s*.38);
    ctx.closePath();ctx.fillStyle='rgba(139,92,246,.8)';ctx.fill();ctx.stroke();

    /* cockpit */
    ctx.beginPath();ctx.ellipse(s*.42,0,s*.28,s*.2,0,0,Math.PI*2);
    ctx.fillStyle='rgba(6,182,212,.75)';ctx.strokeStyle='rgba(180,240,255,.4)';ctx.lineWidth=.7;
    ctx.fill();ctx.stroke();

    /* cockpit highlight */
    ctx.beginPath();ctx.ellipse(s*.34,-s*.07,s*.1,s*.07,-.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();

    ctx.restore();
  }

  /* ── Draw loop ── */
  function draw(){
    ctx.clearRect(0,0,W,H);

    /* sparkle stars */
    stars.forEach(s=>{
      s.a=Math.max(.05,Math.min(.8,s.a+s.va));
      if(s.a<=.05||s.a>=.8)s.va*=-1;
      if(!s.sparkle&&Math.random()<.0004)s.sparkle=1;

      if(s.sparkle>0){
        const len=s.r*9*s.sparkle;
        ctx.globalAlpha=s.sparkle*.6;
        for(let i=0;i<4;i++){
          const ang=i*Math.PI/2;
          ctx.beginPath();
          ctx.moveTo(s.x,s.y);
          ctx.lineTo(s.x+Math.cos(ang)*len,s.y+Math.sin(ang)*len);
          ctx.strokeStyle='rgba(220,200,255,1)';ctx.lineWidth=.6;ctx.stroke();
        }
        ctx.globalAlpha=1;
        s.sparkle=Math.max(0,s.sparkle-.036);
      }

      ctx.beginPath();ctx.arc(s.x,s.y,s.r*(1+.3*(s.sparkle||0)),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${Math.min(s.a+(s.sparkle||0)*.55,1)})`;ctx.fill();
    });

    /* shooting stars */
    if(Math.random()<.0025&&shooters.length<3){
      const spd=Math.random()*5+4,ang=Math.PI*.22+Math.random()*.15;
      shooters.push({
        x:Math.random()*W*.7+W*.05,y:Math.random()*H*.32,
        vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
        len:Math.random()*90+50,life:Math.random()*25+18,age:0
      });
    }
    for(let i=shooters.length-1;i>=0;i--){
      const s=shooters[i];
      s.x+=s.vx;s.y+=s.vy;s.age++;
      const a=1-s.age/s.life;
      if(a<=0){shooters.splice(i,1);continue;}
      const sp=Math.sqrt(s.vx*s.vx+s.vy*s.vy);
      const tx=s.x-s.vx/sp*s.len,ty=s.y-s.vy/sp*s.len;
      const g=ctx.createLinearGradient(tx,ty,s.x,s.y);
      g.addColorStop(0,'rgba(255,255,255,0)');
      g.addColorStop(.6,`rgba(210,195,255,${a*.5})`);
      g.addColorStop(1,`rgba(255,255,255,${a})`);
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);
      ctx.strokeStyle=g;ctx.lineWidth=1.6;ctx.stroke();
      ctx.beginPath();ctx.arc(s.x,s.y,1.8,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
    }

    /* spaceship */
    if(!ship.active){
      if(--ship.timer<=0)spawnShip();
    } else {
      ship.x+=ship.vx;ship.y+=ship.vy;
      ship.trail.unshift({x:ship.x,y:ship.y});
      if(ship.trail.length>30)ship.trail.pop();

      ship.trail.forEach((t,i)=>{
        const a=(1-i/ship.trail.length)*.42;
        const r=(1-i/ship.trail.length)*ship.size*.17;
        if(r<.1)return;
        ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);
        ctx.fillStyle=`rgba(139,92,246,${a})`;ctx.fill();
      });

      drawShip(ship.x,ship.y,ship.size,ship.dir);

      if(ship.x<-160||ship.x>W+160||ship.y<-70||ship.y>H+70){
        ship.active=false;
        ship.timer=Math.floor(Math.random()*500+300);
      }
    }

    /* color particles (mouse-reactive) */
    particles.forEach(p=>{
      const dx=mx-p.x,dy=my-p.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){p.vx-=dx/dist*.04;p.vy-=dy/dist*.04}
      p.vx*=.98;p.vy*=.98;
      p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.c},.6)`;ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
